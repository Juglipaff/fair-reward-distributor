name: Feature request
description: Propose a change or addition to the library.
title: "[feat] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before opening: check [CONTRIBUTING.md](../blob/main/CONTRIBUTING.md) for scope. Wrapper contracts and downstream integrations belong in your own repo.

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: What problem does this solve? Why is it in scope for the primitive itself, not a wrapper?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Concrete API / behavior change. Include function signatures or invariants if relevant.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What else did you try / think about? Why is this the right shape?
    validations:
      required: true

  - type: checkboxes
    id: breaking
    attributes:
      label: Breaking change?
      options:
        - label: This change modifies existing behavior or storage layout.

  - type: textarea
    id: notes
    attributes:
      label: Additional context
